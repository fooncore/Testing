<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fooncore Solutions | Your One-Stop IT Management Partner</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for visual anchors/icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* --- BRAND IDENTITY SYSTEM --- */
        :root {
            --cyan-primary: #00D2FF;      /* Matched from logo text */
            --slate-dark: #0A0F18;        /* Professional dark background */
            --slate-card: #141B27;        /* Distinct card element background */
            --text-light: #FFFFFF;        /* Primary headers */
            --text-muted: #94A3B8;        /* High-readability paragraph color */
            --text-dark: #1E293B;         /* Dark text for white sections */
            --bg-light: #F8FAFC;          /* Clean light section background */
            --font-main: 'Inter', sans-serif;
            --transition: all 0.3s ease;
        }

        /* --- GLOBAL RESETS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--slate-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        ul { list-style: none; }
        a { text-decoration: none; color: inherit; }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* --- TYPOGRAPHY --- */
        h1, h2, h3, h4 {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .section-tag {
            color: var(--cyan-primary);
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
            display: inline-block;
        }

        .section-title {
            font-size: 2.25rem;
            margin-bottom: 3rem;
            position: relative;
        }

        .light-bg .section-title { color: var(--text-dark); }

        /* --- BUTTONS --- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            font-weight: 600;
            border-radius: 6px;
            transition: var(--transition);
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-primary {
            background-color: var(--cyan-primary);
            color: var(--slate-dark);
        }

        .btn-primary:hover {
            background-color: #00b4dc;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .btn-secondary {
            border: 2px solid var(--cyan-primary);
            color: var(--cyan-primary);
            background: transparent;
        }

        .btn-secondary:hover {
            background: rgba(0, 210, 255, 0.1);
            transform: translateY(-2px);
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 15, 24, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem 0;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .logo span { color: var(--cyan-primary); }
        .logo::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: var(--cyan-primary);
            border-radius: 50%;
            display: inline-block;
            margin-left: 2px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .nav-links a:hover { color: var(--cyan-primary); }

        /* --- HERO SECTION --- */
        .hero {
            padding: 12rem 0 7rem;
            background: radial-gradient(circle at 80% 20%, rgba(0, 210, 255, 0.07) 0%, transparent 50%);
            position: relative;
        }

        .hero-content { max-width: 800px; }
        .hero h1 {
            font-size: 3.5rem;
            line-height: 1.15;
            margin-bottom: 1.5rem;
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 650px;
        }

        /* --- ABOUT US & LEADERSHIP --- */
        .about {
            padding: 6rem 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
        }

        .about-text p {
            color: var(--text-dark);
            font-size: 1.05rem;
            margin-bottom: 1.5rem;
            opacity: 0.85;
        }

        .founder-card {
            background: var(--text-light);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
            border-left: 4px solid var(--cyan-primary);
        }

        .founder-card h3 { font-size: 1.4rem; margin-bottom: 0.25rem; color: var(--slate-dark); }
        .founder-title { color: var(--cyan-primary); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 1rem; }
        .founder-card p { font-size: 0.95rem; color: var(--text-dark); opacity: 0.8; }

        /* --- MISSION & VISION --- */
        .mv-section {
            padding: 5rem 0;
            background: linear-gradient(180deg, var(--bg-light) 0%, var(--slate-dark) 100%);
            color: var(--text-dark);
        }

        .mv-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        .mv-card {
            background: var(--text-light);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .mv-card i { font-size: 2rem; color: var(--cyan-primary); margin-bottom: 1.5rem; }
        .mv-card h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--slate-dark); }
        .mv-card p { color: var(--text-dark); opacity: 0.8; }

        /* --- SERVICES SECTION --- */
        .services { padding: 6rem 0; }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background-color: var(--slate-card);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: var(--transition);
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.3);
        }

        .service-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .service-icon i { color: var(--cyan-primary); font-size: 1.25rem; }
        .service-card h3 { font-size: 1.3rem; margin-bottom: 1rem; }
        .service-card p { color: var(--text-muted); font-size: 0.95rem; }

        /* --- WHY CHOOSE US & APPROACH --- */
        .why-choose-us {
            padding: 6rem 0;
            background-color: var(--slate-card);
        }

        .split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
        }

        .list-item {
            display: flex;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .list-icon {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cyan-primary);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .list-content h4 { font-size: 1.15rem; margin-bottom: 0.5rem; }
        .list-content p { color: var(--text-muted); font-size: 0.95rem; }

        .approach-step {
            position: relative;
            padding-left: 3rem;
            margin-bottom: 2.5rem;
        }

        .approach-step::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 30px;
            bottom: -30px;
            width: 2px;
            background: rgba(255,255,255,0.05);
        }

        .approach-step:last-child::before { display: none; }
        .step-num {
            position: absolute;
            left: 0;
            top: 0;
            width: 30px;
